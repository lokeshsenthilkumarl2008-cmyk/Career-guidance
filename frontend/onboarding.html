<!--
Create a user input form page

Fields:
- Name (text)
- Skills (comma-separated input)
- Interests (text)
- Education (dropdown)

Buttons:
- Submit → calls onboarding.js

Layout:
- Centered form card
- Proper labels and placeholders
- Validation messages

Design:
- Clean UI with spacing
- Responsive layout
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - Career Advisor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Career Advisor</h1>
            <ul class="nav-links">
                <li><a href="intex.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <!-- Onboarding Form -->
    <section class="onboarding">
        <div class="container">
            <div class="form-card">
                <h2>Tell Us About Yourself</h2>
                <form id="onboarding-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="skills">Skills</label>
                        <input type="text" id="skills" name="skills"
                            placeholder="e.g., Python, JavaScript, SQL (comma-separated)" required>
                    </div>

                    <div class="form-group">
                        <label for="interests">Interests</label>
                        <input type="text" id="interests" name="interests"
                            placeholder="e.g., Technology, Data Analysis, Design (comma-separated)" required>
                    </div>

                    <div class="form-group">
                        <label for="education">Education Level</label>
                        <select id="education" name="education" required>
                            <option value="">Select your education level</option>
                            <option value="High School">High School</option>
                            <option value="Associate Degree">Associate Degree</option>
                            <option value="Bachelor's Degree">Bachelor's Degree</option>
                            <option value="Master's Degree">Master's Degree</option>
                            <option value="PhD">PhD</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <button type="submit" class="cta-button">Get Career Recommendations</button>
                </form>
                <div id="error-message" class="error-message"></div>
            </div>
        </div>
    </section>

    <script src="js/onboarding.js"></script>
    <script src="js/api.js"></script>
</body>

</html>
